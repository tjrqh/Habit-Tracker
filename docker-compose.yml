version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: habit-tracker-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-habit_tracker}
      MYSQL_USER: ${MYSQL_USER:-habit_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-habit_password}
      TZ: 'UTC'
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - habit-tracker-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-habit_user}", "-p${MYSQL_PASSWORD:-habit_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habit-tracker-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: "mysql://${MYSQL_USER:-habit_user}:${MYSQL_PASSWORD:-habit_password}@mysql:3306/${MYSQL_DATABASE:-habit_tracker}"
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
      JWT_EXPIRES_IN: 7d
      LOG_LEVEL: debug
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    networks:
      - habit-tracker-network
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
    driver: local

networks:
  habit-tracker-network:
    driver: bridge
